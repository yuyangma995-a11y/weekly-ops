<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>渔之源 · 周度经营中心</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a1a;--ink2:#4a4a4a;--ink3:#999;
  --bg:#f5f4f0;--sf:#fff;--s2:#f7f6f3;--s3:#f0efe9;
  --bd:#e5e4de;--bd2:#d0cfc8;
  --G:#2d7a3a;--Gbg:#edf7ee;--Gbd:#c3e6c9;
  --A:#9a5f00;--Abg:#fff8ec;--Abd:#f5d78e;
  --R:#c0392b;--Rbg:#fdf0ee;--Rbd:#f5c0ba;
  --B:#1a5faa;--Bbg:#eef4fc;
}
@media(prefers-color-scheme:dark){:root{
  --ink:#e8e6df;--ink2:#aaa8a0;--ink3:#666;
  --bg:#141412;--sf:#1c1b18;--s2:#242320;--s3:#2a2926;
  --bd:#2e2d2a;--bd2:#3a3936;
  --G:#5dba6e;--Gbg:#1a2e1c;--Gbd:#2d5c35;
  --A:#e8a030;--Abg:#2a2010;--Abd:#5a3a00;
  --R:#e87060;--Rbg:#2a1815;--Rbd:#5a2520;
  --B:#6baae8;--Bbg:#101f30;
}}
html,body{min-height:100vh;background:var(--bg);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--ink);font-size:14px}
.w{max-width:1040px;margin:0 auto;padding:0 20px 60px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0 14px;border-bottom:1px solid var(--bd);margin-bottom:20px;gap:10px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px}
.wpill{font-size:11px;padding:3px 9px;border-radius:4px;background:var(--s2);color:var(--ink2);border:.5px solid var(--bd);margin-left:8px}
.nav{display:flex;gap:5px;flex-wrap:wrap}
.nb{font-size:12px;padding:6px 13px;border-radius:7px;border:.5px solid var(--bd2);background:transparent;color:var(--ink2);cursor:pointer;font-family:inherit;transition:all .15s}
.nb:hover{background:var(--s2)}
.nb.on{background:var(--ink);color:var(--sf);border-color:var(--ink)}

/* AI 配置面板 */
.cfg-panel{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:16px 20px;margin-bottom:18px}
.cfg-top{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.cfg-title{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px}
.cfg-status{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.cfg-ok{background:var(--Gbg);color:var(--G);border:.5px solid var(--Gbd)}
.cfg-no{background:var(--Abg);color:var(--A);border:.5px solid var(--Abd)}
.cfg-arrow{font-size:12px;color:var(--ink3);transition:transform .2s}
.cfg-arrow.open{transform:rotate(180deg)}
.cfg-body{margin-top:14px;display:none}
.cfg-body.open{display:block}

/* 预设按钮 */
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.preset{font-size:11px;padding:5px 12px;border-radius:6px;border:.5px solid var(--bd2);background:transparent;color:var(--ink2);cursor:pointer;font-family:inherit;transition:all .15s}
.preset:hover{background:var(--s2);color:var(--ink)}
.preset.on{background:var(--ink);color:var(--sf);border-color:var(--ink)}

/* 配置字段 */
.cfg-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cfg-field{display:flex;flex-direction:column;gap:4px}
.cfg-field.full{grid-column:1/-1}
.cfg-label{font-size:11px;color:var(--ink3);font-weight:500}
.cfg-input{font-size:12px;padding:8px 10px;border:.5px solid var(--bd2);border-radius:6px;background:var(--s2);color:var(--ink);font-family:inherit;outline:none;transition:border-color .15s}
.cfg-input:focus{border-color:var(--ink);background:var(--sf)}
.cfg-save{font-size:12px;padding:8px 20px;border-radius:7px;border:none;background:var(--ink);color:var(--sf);cursor:pointer;font-family:inherit;font-weight:500}
.cfg-save:hover{opacity:.82}
.cfg-hint{font-size:11px;color:var(--ink3);line-height:1.6;margin-top:8px}
.cfg-hint a{color:var(--B);text-decoration:none}
.cfg-hint a:hover{text-decoration:underline}

/* Pages */
.pg{display:none}.pg.on{display:block}

/* Upload */
.dz{border:2px dashed var(--bd2);border-radius:14px;padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--sf);position:relative}
.dz:hover,.dz.drag{border-color:var(--ink);background:var(--s2)}
.dz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:36px;margin-bottom:14px}
.dz-title{font-size:15px;font-weight:600;margin-bottom:6px}
.dz-sub{font-size:12px;color:var(--ink3);line-height:1.7}
.fl{display:flex;flex-direction:column;gap:6px;margin-top:14px}
.fi{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--sf);border:.5px solid var(--bd);border-radius:9px}
.fi-ico{font-size:18px;flex-shrink:0}
.fi-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fi-dept{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--Bbg);color:var(--B);white-space:nowrap}
.fi-rm{font-size:18px;color:var(--ink3);cursor:pointer;padding:0 4px;border:none;background:transparent;line-height:1}
.fi-rm:hover{color:var(--R)}
.abar{display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.pt{flex:1;min-width:60px;height:3px;background:var(--bd);border-radius:2px}
.pf{height:100%;background:var(--G);border-radius:2px;transition:width .4s}
.ptxt{font-size:11px;color:var(--ink3);white-space:nowrap}
.btn{font-size:13px;padding:9px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap;border:none}
.bp{background:var(--ink);color:var(--sf)}.bp:hover{opacity:.82}.bp:disabled{opacity:.35;cursor:not-allowed}
.bs{background:transparent;color:var(--ink2);border:.5px solid var(--bd2)}.bs:hover{background:var(--s2)}

/* Processing */
.proc{display:none;padding:50px 20px;text-align:center}
.proc.on{display:block}
.spin{width:34px;height:34px;border:2.5px solid var(--bd2);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-title{font-size:15px;font-weight:600;margin-bottom:6px}
.proc-sub{font-size:12px;color:var(--ink3);margin-bottom:20px}
.slist{display:flex;flex-direction:column;gap:7px;max-width:420px;margin:0 auto}
.si{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:8px;background:var(--s2);font-size:12px;color:var(--ink3)}
.si.doing{color:var(--ink);background:var(--s3)}
.si.done{color:var(--G)}
.si.err{color:var(--R)}
.si-dot{width:7px;height:7px;border-radius:50%;background:var(--bd2);flex-shrink:0}
.si.doing .si-dot{background:var(--ink);animation:pulse 1s ease-in-out infinite}
.si.done .si-dot{background:var(--G)}
.si.err .si-dot{background:var(--R)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.si-r{margin-left:auto;font-size:11px}

/* Report */
.rtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.rt{font-size:12px;padding:6px 13px;border-radius:7px;border:.5px solid var(--bd);background:transparent;color:var(--ink3);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
.rt:hover{background:var(--s2);color:var(--ink)}
.rt.on{background:var(--sf);color:var(--ink);border-color:var(--bd2)}
.rt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rcard{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:20px 22px;margin-bottom:14px}
.rcard-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:10px}
.rcard-title{font-size:15px;font-weight:700}
.rcard-wk{font-size:11px;color:var(--ink3);margin-top:3px}
.rpill{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.rp-r{background:var(--Rbg);color:var(--R);border:.5px solid var(--Rbd)}
.rp-a{background:var(--Abg);color:var(--A);border:.5px solid var(--Abd)}
.rp-g{background:var(--Gbg);color:var(--G);border:.5px solid var(--Gbd)}
.mgrid{display:grid;gap:8px;margin-bottom:18px}
.mg2{grid-template-columns:repeat(2,minmax(0,1fr))}
.mg3{grid-template-columns:repeat(3,minmax(0,1fr))}
.mg4{grid-template-columns:repeat(4,minmax(0,1fr))}
.mc{background:var(--s2);border-radius:8px;padding:12px 14px}
.mc-l{font-size:11px;color:var(--ink3);margin-bottom:5px;line-height:1.4}
.mc-v{font-size:19px;font-weight:700;letter-spacing:-.4px}
.mc-d{font-size:11px;margin-top:4px}
.up{color:var(--G)}.dn{color:var(--R)}.fl2{color:var(--ink3)}
.mc-c{font-size:11px;color:var(--ink3);margin-top:2px}
.sh{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.tscroll{overflow-x:auto;margin-bottom:14px}
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{font-size:11px;font-weight:600;color:var(--ink3);text-align:left;padding:7px 10px;border-bottom:.5px solid var(--bd);background:var(--s2);white-space:nowrap}
.stbl td{padding:7px 10px;border-bottom:.5px solid var(--bd);color:var(--ink2);vertical-align:middle}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--s2)}
.td-b{font-weight:500;color:var(--ink)}
.rl{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.ri{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--s2);border-radius:7px;font-size:12px}
.ri-l{flex:1;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri-cur{font-weight:700;color:var(--ink);min-width:36px;text-align:center}
.ri-prev{font-size:11px;color:var(--ink3);min-width:50px}
.ri-d{font-size:11px;min-width:36px;text-align:right}
.fds{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.fd{font-size:12.5px;line-height:1.65;padding:10px 13px;border-radius:8px;border-left:3px solid}
.fd.good{background:var(--Gbg);border-color:var(--G)}
.fd.warn{background:var(--Abg);border-color:var(--A)}
.fd.risk{background:var(--Rbg);border-color:var(--R)}
.fd.action{background:var(--Bbg);border-color:var(--B)}
.fd-txt{color:var(--ink2)}
.sgs{display:flex;flex-direction:column;gap:6px}
.sg{display:flex;gap:8px;font-size:12.5px;color:var(--ink2);line-height:1.6;padding:9px 12px;background:var(--s2);border-radius:7px}
.sg-n{font-size:11px;font-weight:700;color:var(--ink3);min-width:16px;margin-top:2px;flex-shrink:0}

/* Overview */
.ov-top{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:20px}
.ovm{background:var(--sf);border:.5px solid var(--bd);border-radius:9px;padding:13px 15px}
.ovm-l{font-size:11px;color:var(--ink3);margin-bottom:5px}
.ovm-v{font-size:21px;font-weight:700;letter-spacing:-.5px}
.ovm-s{font-size:11px;color:var(--ink3);margin-top:3px}
.dg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:20px}
.dc{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:14px 16px}
.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dc-name{font-size:13px;font-weight:600}
.dc-rows{display:flex;flex-direction:column;gap:5px}
.dc-row{display:flex;justify-content:space-between;font-size:12px}
.dc-rl{color:var(--ink3)}.dc-rv{font-weight:500}
.dc-risk{font-size:11px;color:var(--A);margin-top:7px;padding-top:7px;border-top:.5px solid var(--bd);line-height:1.5}
.decs{display:flex;flex-direction:column;gap:8px}
.dei{display:flex;gap:10px;padding:13px 15px;border-radius:9px;border:.5px solid var(--bd);background:var(--sf)}
.dei-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dei-tag{font-size:11px;font-weight:600;margin-bottom:4px}
.dei-txt{font-size:12.5px;color:var(--ink2);line-height:1.6}
.dei-btn{display:inline-block;font-size:11px;margin-top:7px;padding:4px 11px;border-radius:5px;border:.5px solid var(--bd2);color:var(--ink3);cursor:pointer;background:transparent;font-family:inherit}
.dei-btn:hover{background:var(--s2);color:var(--ink)}
.ob{background:var(--sf);border:.5px solid var(--bd2);border-radius:12px;padding:18px 20px;margin-top:14px}
.ob-l{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.ob-txt{font-size:15px;line-height:1.8;font-style:italic}

/* History */
.htscroll{overflow-x:auto}
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{font-size:11px;font-weight:600;color:var(--ink3);text-align:left;padding:8px 12px;border-bottom:1px solid var(--bd);background:var(--s2);white-space:nowrap}
.htbl td{padding:9px 12px;border-bottom:.5px solid var(--bd);color:var(--ink2)}
.htbl tr:hover td{background:var(--s2)}
.hw{font-weight:600;color:var(--ink)}
.hdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}
.spark{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:16px 18px;margin-top:14px}
.sp-l{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.sp-bars{display:flex;align-items:flex-end;gap:5px;height:52px}
.sp-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.sp-bar{width:100%;border-radius:3px 3px 0 0;background:var(--bd2);min-height:4px}
.sp-bar.cur{background:var(--ink)}
.sp-wk{font-size:10px;color:var(--ink3)}
/* 追问框 */
.ask-box{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:18px 20px;margin-top:14px}
.ask-label{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ask-label-icon{width:20px;height:20px;border-radius:50%;background:var(--ink);color:var(--sf);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ask-input-row{display:flex;gap:8px;align-items:flex-end}
.ask-textarea{flex:1;font-size:13px;padding:9px 12px;border:.5px solid var(--bd2);border-radius:8px;background:var(--s2);color:var(--ink);font-family:inherit;resize:none;min-height:42px;max-height:120px;outline:none;line-height:1.5;transition:border-color .15s}
.ask-textarea:focus{border-color:var(--ink);background:var(--sf)}
.ask-send{font-size:12px;padding:9px 16px;border-radius:8px;border:none;background:var(--ink);color:var(--sf);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:opacity .15s;flex-shrink:0}
.ask-send:hover{opacity:.82}
.ask-send:disabled{opacity:.4;cursor:not-allowed}
.ask-presets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.ask-preset{font-size:11px;padding:4px 10px;border-radius:20px;border:.5px solid var(--bd2);background:transparent;color:var(--ink3);cursor:pointer;font-family:inherit;transition:all .15s}
.ask-preset:hover{background:var(--s2);color:var(--ink);border-color:var(--bd2)}
.ask-history{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.ask-q{font-size:12.5px;color:var(--ink2);background:var(--s2);padding:8px 12px;border-radius:8px;line-height:1.6}
.ask-q-label{font-size:11px;color:var(--ink3);margin-bottom:3px;font-weight:500}
.ask-a{font-size:12.5px;color:var(--ink);line-height:1.7;white-space:pre-wrap;padding:10px 14px;border-left:3px solid var(--bd2);margin-top:2px}
.ask-a-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink3);padding:10px 0}
.ask-a-dot{width:6px;height:6px;border-radius:50%;background:var(--ink3);animation:ask-pulse 1.2s ease-in-out infinite}
.ask-a-dot:nth-child(2){animation-delay:.2s}
.ask-a-dot:nth-child(3){animation-delay:.4s}
@keyframes ask-pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* 追问框 */
.ask-wrap{margin-top:20px;background:var(--sf);border:.5px solid var(--bd);border-radius:12px;overflow:hidden}
.ask-history{max-height:320px;overflow-y:auto;padding:0}
.ask-bubble{padding:12px 16px;border-bottom:.5px solid var(--bd)}
.ask-bubble:last-child{border-bottom:none}
.ask-q{display:flex;gap:8px;align-items:flex-start;margin-bottom:0}
.ask-q-label{font-size:11px;font-weight:600;color:var(--B);white-space:nowrap;margin-top:2px}
.ask-q-text{font-size:13px;color:var(--ink);line-height:1.6}
.ask-a{margin-top:8px;display:flex;gap:8px;align-items:flex-start}
.ask-a-label{font-size:11px;font-weight:600;color:var(--G);white-space:nowrap;margin-top:2px}
.ask-a-text{font-size:13px;color:var(--ink2);line-height:1.7;white-space:pre-wrap;flex:1}
.ask-a-loading{font-size:13px;color:var(--ink3);animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ask-input-row{display:flex;gap:8px;padding:12px 16px;border-top:.5px solid var(--bd);background:var(--s2)}
.ask-input{flex:1;font-size:13px;padding:9px 12px;border:.5px solid var(--bd2);border-radius:8px;background:var(--sf);color:var(--ink);font-family:inherit;outline:none;resize:none;min-height:40px;max-height:120px;line-height:1.5}
.ask-input:focus{border-color:var(--ink)}
.ask-send{font-size:13px;padding:9px 18px;border-radius:8px;border:none;background:var(--ink);color:var(--sf);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;flex-shrink:0}
.ask-send:hover{opacity:.82}
.ask-send:disabled{opacity:.4;cursor:not-allowed}
.ask-tips{display:flex;gap:6px;padding:10px 16px;flex-wrap:wrap;border-bottom:.5px solid var(--bd)}
.ask-tip{font-size:11px;padding:4px 10px;border-radius:20px;border:.5px solid var(--bd2);color:var(--ink3);cursor:pointer;background:transparent;font-family:inherit;transition:all .15s}
.ask-tip:hover{background:var(--s2);color:var(--ink);border-color:var(--ink3)}
.ask-context{font-size:11px;color:var(--ink3);padding:8px 16px;border-bottom:.5px solid var(--bd)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--sf);font-size:13px;padding:10px 20px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
@media(max-width:640px){
  .ov-top{grid-template-columns:repeat(2,minmax(0,1fr))}
  .dg{grid-template-columns:1fr}
  .mg4,.mg3{grid-template-columns:repeat(2,minmax(0,1fr))}
  .cfg-fields{grid-template-columns:1fr}
}

/* ─ Chat 追问 ─ */
.chat-box{margin-top:14px;background:var(--sf);border:.5px solid var(--bd);border-radius:12px;overflow:hidden}
.chat-header{padding:11px 16px;border-bottom:.5px solid var(--bd);font-size:12px;font-weight:600;color:var(--ink2);display:flex;align-items:center;gap:6px}
.chat-header-dot{width:7px;height:7px;border-radius:50%;background:var(--G)}
.chat-messages{padding:14px 16px;display:flex;flex-direction:column;gap:10px;min-height:0;max-height:420px;overflow-y:auto}
.chat-messages:empty{display:none}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.user{flex-direction:row-reverse}
.chat-bubble{font-size:13px;line-height:1.65;padding:9px 13px;border-radius:10px;max-width:85%}
.chat-msg.user .chat-bubble{background:var(--ink);color:var(--sf);border-radius:10px 10px 2px 10px}
.chat-msg.ai .chat-bubble{background:var(--s2);color:var(--ink);border-radius:10px 10px 10px 2px;white-space:pre-wrap}

<script>
// ══════════════════════════════════════════
// 常量
// ══════════════════════════════════════════
const DEPT_MAP = [
  ['天猫','tmall'],['京东','jd'],['拼多多','pdd'],
  ['抖音平台','douyin'],['直播部','live'],['直播间','live'],['直播','live'],
  ['达人','kol'],['品牌视频','brand'],['品牌','brand'],['视频中心','brand'],
  ['客服','cs'],['仓储','warehouse'],['供应链','warehouse'],
  ['大客户','key'],['跨境','cross'],['财务','finance'],
  ['人力','hr'],['HR','hr'],['IT','it'],['数据','it'],
  // 新增部门映射（基于2026年各部门规划文件）
  ['渔之源事','biz4'],['渔之源事业四部','biz4'],
  ['彩麦','purchase'],['采购','purchase'],
  ['视觉中心','visual'],['视觉','visual'],
  ['PAA事业部','paa'],['PAA事','paa'],['PAA','paa'],['PAA事业','paa'],
  ['电商一部','ec1'],['电商一','ec1'],['电商一部（钓竿）','ec1'],
  ['电商二部','ec2'],['电商二','ec2'],['电商二部（钓椅&配件&鱼钩)','ec2'],
  ['电商三部','ec3'],['电商三','ec3'],['电商三部（钓伞&线&台钓装备）','ec3'],
  ['电商四部','ec4'],['电商四','ec4'],['电商四部（渔具包&盒类&漂）','ec4'],
  ['电商五部','ec5'],['电商五','ec5'],['电商五部（鱼护&水桶&钓箱&服装防护）','ec5'],
  ['电商六部','ec6'],['电商六','ec6'],['电商六部（支架及&路亚竿&路亚装备)','ec6'],
  ['电商七部','ec7'],['电商七','ec7'],['电商七部（抄网&渔轮）','ec7'],
];
const DEPT_NAMES = {
  tmall:'天猫平台',jd:'京东平台',pdd:'拼多多平台',
  douyin:'抖音平台',live:'直播部',kol:'达人/内容部',
  brand:'品牌/视频部',cs:'客服部',warehouse:'仓储/供应链',
  key:'大客户部',cross:'跨境部',finance:'财务部',
  hr:'HR/行政',it:'IT/数据部',other:'其他部门',
  // 新增部门显示名称
  biz4:'渔之源事业四部',purchase:'采购中心',
  visual:'视觉中心',paa:'PAA事业部',
  ec1:'电商一部（钓竿）',ec2:'电商二部（钓椅&配件&鱼钩)',
  ec3:'电商三部（钓伞&线&台钓装备）',ec4:'电商四部（渔具包&盒类&漂）',
  ec5:'电商五部（鱼护&水桶&钓箱&服装防护）',ec6:'电商六部（支架及&路亚竿&路亚装备)',
  ec7:'电商七部（抄网&渔轮）'
};
const RAG = {
  r:{cls:'rp-r',label:'红灯 · 需决策',color:'var(--R)'},
  a:{cls:'rp-a',label:'黄灯 · 需关注',color:'var(--A)'},
  g:{cls:'rp-g',label:'绿灯 · 正常',color:'var(--G)'}
};

// 各服务商预设
const PRESETS = {
  claude: {
    url: 'https://api.anthropic.com/v1',
    model: 'claude-sonnet-4-20250514',
    hint: '获取 Key：<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> → API Keys → Create Key（需充值 $5 才能调用）',
    mode: 'anthropic'
  },
  deepseek: {
    url: 'https://api.deepseek.com/v1',
    model: 'deepseek-chat',
    hint: '获取 Key：<a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> → API Keys（价格极低，有免费额度）',
    mode: 'openai'
  },
  qwen: {
    url: 'https://dashscope.aliyuncs.com/compatible-mode/v1',
    model: 'qwen-plus',
    hint: '获取 Key：<a href="https://dashscope.console.aliyun.com" target="_blank">阿里云百炼控制台</a> → API Key 管理（有免费额度）',
    mode: 'openai'
  },
  moonshot: {
    url: 'https://api.moonshot.cn/v1',
    model: 'moonshot-v1-8k',
    hint: '获取 Key：<a href="https://platform.moonshot.cn" target="_blank">platform.moonshot.cn</a> → API Key（有免费额度）',
    mode: 'openai'
  },
  openai: {
    url: 'https://api.openai.com/v1',
    model: 'gpt-4o-mini',
    hint: '获取 Key：<a href="https://platform.openai.com" target="_blank">platform.openai.com</a> → API Keys',
    mode: 'openai'
  },
  custom: {
    url: '',
    model: '',
    hint: '填入任何兼容 OpenAI 格式的接口地址和 Key 即可',
    mode: 'openai'
  }
};

// ══════════════════════════════════════════
// 状态
// ══════════════════════════════════════════
let pendingFiles = [];
let parsedDepts  = [];
let aiReports    = {};

// ══════════════════════════════════════════
// 工具
// ══════════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}
function wkNum() {
  const d = new Date(), s = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-s)/864e5+s.getDay()+1)/7);
}
function fmtM(n) {
  const x = parseFloat(n);
  if (!x||isNaN(x)) return '—';
  if (Math.abs(x)>=1e8) return (x/1e8).toFixed(2)+'亿';
  if (Math.abs(x)>=1e4) return (x/1e4).toFixed(1)+'万';
  return Math.round(x).toLocaleString();
}
function cleanVal(v) {
  if (v===null||v===undefined||v==='') return null;
  const s = String(v).trim().toLowerCase();
  if (['#div/0!','#value!','#ref!','#n/a','#name?','/','无数据','小二暂未回复'].includes(s)) return null;
  return v;
}
function fmtVal(v) {
  if (v===null) return null;
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  if (Math.abs(n)<2&&n!==0) return (n*100).toFixed(1)+'%';
  if (Math.abs(n)>=1e4) return (n/1e4).toFixed(1)+'万';
  return Math.round(n).toLocaleString();
}
function detectDept(fn) {
  const f = fn.replace(/\.xlsx?$/i,'');
  for (const [kw,dept] of DEPT_MAP) if (f.includes(kw)) return dept;
  return 'other';
}

// ══════════════════════════════════════════
// AI 接口配置
// ══════════════════════════════════════════
function loadCfg() {
  try { return JSON.parse(localStorage.getItem('yz_cfg')||'{}'); } catch(e) { return {}; }
}
function saveCfg() {
  const cfg = {
    url:   document.getElementById('cfg-url').value.trim().replace(/\/+$/,''),
    key:   document.getElementById('cfg-key').value.trim(),
    model: document.getElementById('cfg-model').value.trim(),
    proxy: document.getElementById('cfg-proxy').value.trim().replace(/\/+$/,''),
    mode:  loadCfg().mode || 'openai'
  };
  if (!cfg.url || !cfg.key || !cfg.model) { toast('请填写完整配置'); return; }
  localStorage.setItem('yz_cfg', JSON.stringify(cfg));
  refreshCfgStatus();
  toggleCfg(false);
  toast('配置已保存');
}
function refreshCfgStatus() {
  const cfg = loadCfg();
  const ok  = !!(cfg.url && cfg.key && cfg.model);
  const el  = document.getElementById('cfg-status');
  el.textContent = ok ? `✓ ${cfg.model}` : '未配置';
  el.className   = 'cfg-status ' + (ok ? 'cfg-ok' : 'cfg-no');
  document.getElementById('run-btn').disabled = !ok || pendingFiles.length===0;
}
function toggleCfg(force) {
  const body  = document.getElementById('cfg-body');
  const arrow = document.getElementById('cfg-arrow');
  const open  = force !== undefined ? force : !body.classList.contains('open');
  body.classList.toggle('open', open);
  arrow.classList.toggle('open', open);
  if (open) {
    const cfg = loadCfg();
    if (cfg.url)   document.getElementById('cfg-url').value   = cfg.url;
    if (cfg.key)   document.getElementById('cfg-key').value   = cfg.key;
    if (cfg.model) document.getElementById('cfg-model').value = cfg.model;
    if (cfg.proxy) document.getElementById('cfg-proxy').value = cfg.proxy;
  }
}
function applyPreset(name) {
  const p = PRESETS[name];
  if (!p) return;
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('on'));
  event.target.classList.add('on');
  if (p.url)   document.getElementById('cfg-url').value   = p.url;
  if (p.model) document.getElementById('cfg-model').value = p.model;
  document.getElementById('cfg-hint').innerHTML = p.hint || '';
  // 保存 mode
  const cfg = loadCfg();
  cfg.mode = p.mode;
  localStorage.setItem('yz_cfg', JSON.stringify(cfg));
  document.getElementById('cfg-key').focus();
}
async function testCfg() {
  const el = document.getElementById('test-result');
  el.textContent = '测试中...'; el.style.color = 'var(--ink3)';
  try {
    const text = await callAI('你是助手，请用一句话回复。', '你好，连接测试', 50);
    el.textContent = '✓ 连接成功：' + text.slice(0,30);
    el.style.color = 'var(--G)';
  } catch(e) {
    el.textContent = '✗ ' + e.message;
    el.style.color = 'var(--R)';
  }
}

// ══════════════════════════════════════════
// 通用 AI 调用（支持 OpenAI 格式 + Anthropic 格式）
// ══════════════════════════════════════════
async function callAI(system, userMsg, maxTokens=900) {
  const cfg = loadCfg();
  if (!cfg.url || !cfg.key || !cfg.model) throw new Error('请先配置 AI 接口');

  const isAnthropic = cfg.url.includes('anthropic.com');
  const targetUrl   = cfg.url + (isAnthropic ? '/messages' : '/chat/completions');

  // 通过代理转发，解决浏览器 CORS 限制
  // 代理地址：优先用配置的代理，否则用相对路径（同域部署时可用）
  const proxyBase = cfg.proxy || '';
  const useProxy  = !!proxyBase;
  const fetchUrl  = useProxy ? proxyBase + '/api/proxy' : targetUrl;

  const headers = { 'Content-Type': 'application/json' };

  let body;
  if (isAnthropic) {
    headers['x-api-key']         = cfg.key;
    headers['anthropic-version'] = '2023-06-01';
    if (!useProxy) headers['anthropic-dangerous-direct-browser-access'] = 'true';
    body = { model: cfg.model, max_tokens: maxTokens, system, messages: [{role:'user',content:userMsg}] };
  } else {
    headers['Authorization'] = `Bearer ${cfg.key}`;
    body = { model: cfg.model, max_tokens: maxTokens,
      messages: [{ role:'system', content:system }, { role:'user', content:userMsg }] };
  }

  if (useProxy) {
    // 通过代理时，把认证信息放进 body，代理负责转发给 AI 服务
    body.target_url = targetUrl;
    body.api_key    = cfg.key;
    body.api_mode   = isAnthropic ? 'anthropic' : 'openai';
    // 代理不需要在 header 里带认证
    delete headers['Authorization'];
    delete headers['x-api-key'];
    delete headers['anthropic-version'];
    delete headers['anthropic-dangerous-direct-browser-access'];
  }

  const resp = await fetch(fetchUrl, { method:'POST', headers, body: JSON.stringify(body) });

  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    const msg = err.error?.message || err.message || '';
    const s   = resp.status;
    if (s===401) throw new Error('API Key 无效，请检查是否填写正确');
    if (s===402) throw new Error('账号余额不足，请充值后重试');
    if (s===403) throw new Error('无访问权限：' + msg);
    if (s===429) throw new Error('请求太频繁，请稍后重试');
    throw new Error(`请求失败 (${s})：${msg||'未知错误'}`);
  }

  const data = await resp.json();
  return isAnthropic
    ? (data.content?.map(i=>i.text||'').join('') || '')
    : (data.choices?.[0]?.message?.content || '');
}

// 智能摘要算法（简化版）
function summarizePlanningText(text, maxChars = 4000) {
    if (!text || text.length <= maxChars) return text;
    
    // 查找关键部分
    const sections = [];
    
    // 查找总体目的
    const purposeMatch = text.match(/总体目的[：:]([^\n]{50,300})/);
    if (purposeMatch) sections.push('总体目的：' + purposeMatch[1].trim());
    
    // 查找年度目标
    const goalMatch = text.match(/年度目标[：:]([^\n]{50,300})/);
    if (goalMatch) sections.push('年度目标：' + goalMatch[1].trim());
    
    // 查找Q2行动计划
    const q2Match = text.match(/第二季度[^：:]*[：:]([^\n]{100,400})/);
    if (q2Match) sections.push('Q2行动计划：' + q2Match[1].trim());
    
    // 如果找到关键部分，组合它们
    if (sections.length > 0) {
        let summary = sections.join('\n\n');
        if (summary.length > maxChars) {
            summary = summary.substring(0, maxChars);
            // 在完整句子处截断
            for (let i = maxChars - 1; i > maxChars - 100; i--) {
                if ('。；，.;,\n'.includes(summary[i])) {
                    summary = summary.substring(0, i + 1);
                    break;
                }
            }
        }
        return summary;
    }
    
    // 如果没有找到特定格式，取前800字符
    return text.substring(0, maxChars);
}

// 加载规划文件（通过手动调用）
function loadPlanningFile(file, callback) {
    const reader = new FileReader();
    
    reader.onload = function(e) {
        try {
            const data = e.target.result;
            const workbook = XLSX.read(data, { type: 'binary' });
            
            // 提取所有文本内容
            let allText = '';
            workbook.SheetNames.forEach(sheetName => {
                const worksheet = workbook.Sheets[sheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                
                jsonData.forEach(row => {
                    row.forEach(cell => {
                        if (cell !== null && cell !== undefined) {
                            allText += String(cell).trim() + ' ';
                        }
                    });
                    allText += '\n';
                });
            });
            
            // 生成智能摘要
            const summary = summarizePlanningText(allText, 4000);
            
            // 检测部门
            let deptCode = 'other';
            const fileName = file.name;
            
            for (const [keyword, code] of DEPT_MAP) {
                if (fileName.includes(keyword)) {
                    deptCode = code;
                    break;
                }
            }
            
            const planningItem = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 9),
                filename: file.name,
                deptCode: deptCode,
                deptName: DEPT_NAMES[deptCode] || fileName,
                summary: summary,
                fullText: allText.substring(0, 10000), // 存储最多10000字符的完整文本
                timestamp: new Date().toLocaleString()
            };
            
            // 存储规划数据
            PLANNING_DATA[deptCode] = planningItem;
            savePlanningData();
            
            // 显示成功消息
            alert(`成功加载规划文件：${file.name}\n部门：${planningItem.deptName}\n摘要长度：${summary.length}字符`);
            
            if (callback) callback(planningItem);
        } catch (error) {
            alert('解析规划文件失败：' + error.message);
            console.error('解析规划文件失败:', file.name, error);
        }
    };
    
    reader.onerror = function(e) {
        alert('读取文件失败：' + e.target.error);
    };
    
    reader.readAsBinaryString(file);
}

// 手动触发规划文件上传
function triggerPlanningUpload() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls';
    input.multiple = true;
    
    input.onchange = function(e) {
        const files = e.target.files;
        if (!files.length) return;
        
        for (let i = 0; i < files.length; i++) {
            loadPlanningFile(files[i], function(item) {
                console.log('规划文件已加载:', item);
            });
        }
    };
    
    input.click();
}

// Excel 解析
// ══════════════════════════════════════════
async function parseExcel(file) {
  const buf  = await file.arrayBuffer();
  const wb   = XLSX.read(buf, {type:'array',cellFormula:false,cellDates:false});
  const ws   = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1,defval:null,raw:true});
  return buildDeptData(rows, detectDept(file.name), file.name);
}
function buildDeptData(rows, dept, filename) {
  const r = { dept, deptName:DEPT_NAMES[dept]||filename, filename, curWeek:null, prevWeek:null, metrics:[], subGroups:[], rankData:[] };
  if (rows.length<2) return r;
  let hIdx=-1;
  for (let i=0;i<Math.min(rows.length,6);i++) {
    if (rows[i].some(v=>v&&/\d+\.\d+/.test(String(v)))) { hIdx=i; break; }
  }
  if (hIdx<0) return r;
  const hrow=rows[hIdx], dateCols=[], sp={};
  hrow.forEach((h,ci)=>{
    if (!h||ci===0) return;
    const s=String(h).replace(/\n/g,'').trim();
    if (s.includes('环比')&&s.includes('率'))  { sp.dr=ci; return; }
    if (s.includes('环比')&&s.includes('值'))  { sp.dv=ci; return; }
    if (s.includes('累计'))                    { sp.acc=ci; return; }
    if (s.includes('目标')&&!s.includes('完成')){ sp.tgt=ci; return; }
    if (s.includes('完成率'))                  { sp.comp=ci; return; }
    if (['账号','直播间'].some(k=>s.includes(k))) { sp.acct=ci; return; }
    if (/\d+\.\d+/.test(s)&&!['销售','成本','推广','未抓'].some(k=>s.includes(k))) dateCols.push({ci,label:s});
  });
  dateCols.sort((a,b)=>a.ci-b.ci);
  const curCol=dateCols[dateCols.length-1], prevCol=dateCols[dateCols.length-2];
  if (!curCol) return r;
  r.curWeek=curCol.label; r.prevWeek=prevCol?.label||null;
  const SKIP=new Set(['双周数据','店铺排名','店铺流量','店铺转化率','类目销售额','类目成本率','类目推广率','渔之源旗舰店排名']);
  let curMetric='';
  for (let ri=hIdx+1;ri<rows.length;ri++) {
    const row=rows[ri];
    const label=row[0]?String(row[0]).replace(/\n/g,'').trim():'';
    if (label) curMetric=label;
    if (SKIP.has(label)) continue;
    if (sp.acct!==undefined) {
      const acct=row[sp.acct]?String(row[sp.acct]).trim():'';
      if (!acct) continue;
      const cv=cleanVal(row[curCol.ci]), pv=cleanVal(prevCol?row[prevCol.ci]:null);
      if (cv===null&&pv===null) continue;
      const comp=sp.comp!==undefined?cleanVal(row[sp.comp]):null;
      const tgt=sp.tgt!==undefined?cleanVal(row[sp.tgt]):null;
      const dr=pv&&cv?((parseFloat(cv)-parseFloat(pv))/Math.abs(parseFloat(pv))*100).toFixed(1)+'%':null;
      r.subGroups.push({metric:curMetric,account:acct,curVal:fmtVal(cv),prevVal:fmtVal(pv),rawCur:cv,rawPrev:pv,completion:comp?fmtVal(comp):null,target:tgt?fmtM(tgt):null,deltaRate:dr});
    } else {
      if (!label) continue;
      const cv=cleanVal(row[curCol.ci]), pv=cleanVal(prevCol?row[prevCol.ci]:null);
      if (cv===null&&pv===null) continue;
      const drRaw=sp.dr!==undefined?cleanVal(row[sp.dr]):null;
      const comp=sp.comp!==undefined?cleanVal(row[sp.comp]):null;
      const tgt=sp.tgt!==undefined?cleanVal(row[sp.tgt]):null;
      const isRank=(label.includes('【')&&label.includes('】'))||(label.includes('排名')&&!label.includes('类目')&&!label.includes('品牌'));
      if (isRank) {
        r.rankData.push({label,curVal:cv!==null?String(cv):null,prevVal:pv!==null?String(pv):null,delta:sp.dv!==undefined?String(cleanVal(row[sp.dv])||''):null});
        continue;
      }
      const trend=(pv!==null&&cv!==null)?(parseFloat(cv)>=parseFloat(pv)?'up':'down'):'flat';
      r.metrics.push({label,trend,curVal:fmtVal(cv),prevVal:fmtVal(pv),rawCur:cv,rawPrev:pv,deltaRate:drRaw?fmtVal(drRaw):null,completion:comp?fmtVal(comp):null,target:tgt?fmtM(tgt):null,accum:null});
    }
  }
  // 直播部汇总
  if (sp.acct!==undefined&&r.subGroups.length) {
    const bm={};
    for (const sg of r.subGroups) {
      if (!bm[sg.metric]) bm[sg.metric]={cur:0,prev:0,cnt:0,comp:sg.completion};
      const c=parseFloat(sg.rawCur)||0, p=parseFloat(sg.rawPrev)||0;
      if (!isNaN(c)) { bm[sg.metric].cur+=c; bm[sg.metric].cnt++; }
      if (!isNaN(p)) bm[sg.metric].prev+=p;
    }
    for (const [metric,agg] of Object.entries(bm)) {
      if (!agg.cnt) continue;
      const dr=agg.prev?((agg.cur-agg.prev)/Math.abs(agg.prev)*100).toFixed(1)+'%':null;
      r.metrics.push({label:metric,curVal:fmtM(agg.cur),prevVal:fmtM(agg.prev),rawCur:agg.cur,rawPrev:agg.prev,deltaRate:dr,completion:agg.comp,target:null,accum:null,trend:agg.prev?(agg.cur>=agg.prev?'up':'down'):'flat'});
    }
  }
  return r;
}

function buildSummary(d) {
  const bizDepts = ['tmall','jd','pdd','douyin','live'];
  const isBiz = bizDepts.includes(d.dept);

  // 检查是否有年度规划数据可用（精确匹配）
  const planning = PLANNING_DATA[d.dept];
  const hasPlanning = !!planning;
  const planningSummary = hasPlanning ? (planning.fullText || planning.summary) : null;
  
  // 检查是否有通过关联管理的规划数据
  const mappedPlanning = getMappedPlanningData(d.dept);
  const hasMappedPlanning = !!mappedPlanning && mappedPlanning.length > 0;
  
  // 构建规划文本
  let planningText = '';
  if (hasPlanning) {
    planningText = `
📋 年度规划摘要（来自文件：${planning.filename}）：
${planningSummary}

基于上述年度规划，请参考以下内容进行对照分析：`;
  } else if (hasMappedPlanning) {
    // 显示关联的规划数据
    planningText = `
📋 关联年度规划摘要（基于部门关联配置）：

`;
    mappedPlanning.forEach((item, index) => {
      planningText += `【${item.deptName}】\\n${item.fullText || item.summary}\\n\\n`;
    });
    planningText += `基于上述关联部门的年度规划，请综合分析对${d.deptName}工作的指导意义：`;
  }

  // 找出异常指标（环比变化超过±20%）
  const anomalies = d.metrics.filter(m => {
    if (!m.deltaRate) return false;
    const pct = parseFloat(m.deltaRate);
    return !isNaN(pct) && Math.abs(pct) >= 20;
  }).map(m => `${m.label}环比${m.deltaRate}（本周${m.curVal}，上周${m.prevVal||'—'}）`);

  const m = d.metrics.slice(0,8).map(x =>
    `${x.label}：本周${x.curVal||'—'}` +
    (x.prevVal    ? `（上周${x.prevVal}）`       : '') +
    (x.deltaRate  ? `（环比${x.deltaRate}）`     : '') +
    (x.completion ? `（月完成率${x.completion}，目标${x.target||'未知'}）` : '')
  ).join('；');

  const sg = d.subGroups.slice(0,6).map(x =>
    `${x.account||x.label}·${x.metric||''}：本周${x.curVal||'—'}` +
    (x.prevVal    ? `上周${x.prevVal}` : '') +
    (x.completion ? `完成率${x.completion}` : '') +
    (x.target     ? `目标${x.target}` : '')
  ).join('；');

  const rk = d.rankData.slice(0,6).map(x =>
    `${x.label}：第${x.curVal}名` +
    (x.prevVal ? `（上周第${x.prevVal}名）` : '') +
    (x.delta   ? `（变化${x.delta}）` : '')
  ).join('；');

  const anomalyText = anomalies.length
    ? `
⚠ 异常指标（环比变化超±20%，需重点分析）：${anomalies.join('；')}`
    : '';

  const deptTypeMap = {
    brand: '品牌部',  kol: '达人部', cs: '客服部',
    warehouse: '仓储/供应链部', finance: '财务中心',
    hr: '人力中心', it: 'IT/数据部', cross: '跨境事业部',
    key: '大客户部', paa: 'PAA事业部',
    visual: '视觉中心', video: '视频中心',
  };
  const deptType = isBiz ? '电商业务部门' : (deptTypeMap[d.dept] || '职能支持部门');

  // 判断是否有实际数据
  const hasData = d.metrics.length > 0 || d.subGroups.length > 0;
  const noDataNote = !hasData
    ? '\n【本部门本周无数字指标数据】\n文件名：' + (d.filename || d.deptName) + '\n' + (hasPlanning || hasMappedPlanning
      ? '已检测到该部门的相关年度规划文件，请基于实际规划内容进行分析。\n重点回答：①该部门Q2（4-6月）最关键的3项工作 ②本周是否应有推进或交付 ③给出具体可执行的下周工作建议'
      : '请从文件名判断部门性质，对照知识库中对应部门的Q2规划进行实质性分析。\n重点回答：①该部门Q2（4-6月）最关键的3项工作 ②本周是否应有推进或交付 ③给出具体可执行的下周工作建议')
    : '';

  // 构建最终提示词
  let prompt = `【${deptType}】${d.deptName}（文件：${d.filename||''}），数据周期：${d.curWeek||'本周（2026年Q2）'}`;

  // 如果有规划数据（精确或关联），添加规划摘要
  if (hasPlanning || hasMappedPlanning) {
    prompt += `
    
${planningText}`;
  }

  prompt += `

核心指标：${m||'（无数字数据）'}
${sg ? '各账号/分组：' + sg : ''}
${rk ? '店铺排名：' + rk : ''}
${anomalyText}
${noDataNote}`;

  // 分析指导部分
  let analysisGuidance = '';
  if (isBiz) {
    analysisGuidance = '重点针对异常指标给出原因分析和可执行的排查优化方案。';
  } else if (hasData) {
    analysisGuidance = '结合部门职能和年度规划知识库评估本周工作质量、进度和风险。';
  } else {
    analysisGuidance = '重要：本部门无数字数据，请完全基于年度规划知识库，分析该部门在Q2应推进的重点工作，并给出具体可执行的工作建议。不要输出"数据缺失"相关内容，而是给出有价值的规划对照分析。';
  }

  // 如果有规划数据（精确或关联），增强分析指导
  if (hasPlanning || hasMappedPlanning) {
    if (isBiz) {
      analysisGuidance = '重点针对异常指标给出原因分析和可执行的排查优化方案，并结合年度规划评估业务方向一致性。';
    } else if (hasData) {
      analysisGuidance = '结合部门职能、实际数据和年度规划内容进行综合分析，评估本周工作对规划目标的贡献度和风险。';
    } else {
      analysisGuidance = '基于已加载的年度规划内容，分析该部门在Q2应推进的重点工作，并给出具体可执行的工作建议。参考规划摘要中的关键目标和工作计划。';
    }
  }

  prompt += `

请按要求进行专业分析。${analysisGuidance}`;

  // 如果有规划数据且无数据，添加特殊指示
  if ((hasPlanning || hasMappedPlanning) && !hasData) {
    prompt += `

特别提示：已提供该部门' + (hasPlanning ? '真实' : '关联') + '的年度规划摘要，请基于实际规划内容进行详细分析，不要提及"知识库"或"假设性规划"。`;
  }

  // 如果有映射规划数据，添加关联说明
  if (hasMappedPlanning && !hasPlanning) {
    prompt += `

📌 关联说明：当前分析基于部门关联配置。${d.deptName}关联到${mappedPlanning.length}个规划部门，请综合参考这些部门的规划目标进行分析。`;
  }

  return prompt;
}

// ══════════════════════════════════════════
// 渲染报告
// ══════════════════════════════════════════
function renderReport(ai,d) {
  var ragRaw = (ai.rag||'g').toLowerCase().trim();
  var rag = ['r','a','g'].includes(ragRaw) ? ragRaw : 'g';
  var h = '<div class="rcard">';
  h += '<div class="rcard-head">';
  h += '<div><div class="rcard-title">'+d.deptName+'</div>';
  h += '<div class="rcard-wk">'+(d.curWeek||'')+'</div></div>';
  h += '<span class="rpill '+RAG[rag].cls+'">'+RAG[rag].label+'</span>';
  h += '</div>';

  // 核心结论
  if (ai.summary) {
    h += '<div style="padding:12px 14px;background:var(--s3);border-radius:8px;margin-bottom:16px;font-size:13px;color:var(--ink);line-height:1.6">';
    h += '<span style="font-weight:600;margin-right:6px">本周结论</span>';
    h += ai.summary+'</div>';
  }

  // 指标卡
  var metrics = (ai.metrics&&ai.metrics.length) ? ai.metrics : d.metrics.slice(0,4).map(function(m){
    return {label:m.label, value:m.curVal||'—', delta:m.deltaRate, trend:m.trend};
  });
  if (metrics.length) {
    var n = Math.min(metrics.length,4);
    h += '<div class="mgrid mg'+n+'">';
    metrics.forEach(function(m) {
      var dc = m.trend==='up'?'up':m.trend==='down'?'dn':'fl2';
      h += '<div class="mc">';
      h += '<div class="mc-l">'+m.label+'</div>';
      h += '<div class="mc-v">'+(m.value||'—')+'</div>';
      if (m.delta && m.delta!=='null') h += '<div class="mc-d '+dc+'">'+m.delta+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // 月完成率卡
  var compMs = d.metrics.filter(function(m){return m.completion;}).slice(0,3);
  if (compMs.length) {
    h += '<div class="mgrid mg'+Math.min(compMs.length,3)+'">';
    compMs.forEach(function(m) {
      var pct = parseFloat(m.completion);
      var color = pct<20?'var(--R)':pct<50?'var(--A)':'var(--G)';
      h += '<div class="mc">';
      h += '<div class="mc-l">'+m.label+'·月完成率</div>';
      h += '<div class="mc-v" style="color:'+color+'">'+m.completion+'</div>';
      if (m.target) h += '<div class="mc-c">目标 '+m.target+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // 子账号明细
  if (d.subGroups.length) {
    h += '<div class="sh">各账号 / 分组明细</div>';
    h += '<div class="tscroll"><table class="stbl">';
    h += '<thead><tr><th>账号</th><th>指标</th><th>本周</th><th>上周</th><th>完成率</th><th>目标</th></tr></thead>';
    h += '<tbody>';
    d.subGroups.slice(0,15).forEach(function(sg) {
      var up = sg.deltaRate ? parseFloat(sg.deltaRate)>=0 : null;
      h += '<tr>';
      h += '<td class="td-b">'+(sg.account||'—')+'</td>';
      h += '<td style="color:var(--ink3)">'+(sg.metric||'—')+'</td>';
      h += '<td>'+(sg.curVal||'—')+'</td>';
      h += '<td style="color:var(--ink3)">'+(sg.prevVal||'—')+'</td>';
      h += '<td class="'+(up===true?'up':up===false?'dn':'')+'">'+(sg.completion||sg.deltaRate||'—')+'</td>';
      h += '<td style="color:var(--ink3)">'+(sg.target||'—')+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // 排名
  if (d.rankData.length) {
    h += '<div class="sh">店铺 / 品牌排名</div><div class="rl">';
    d.rankData.forEach(function(r) {
      var dv = r.delta!==null ? parseFloat(r.delta) : null;
      var dc = dv===null?'':dv>0?'up':dv<0?'dn':'fl2';
      var arrow = dv===null?'':dv>0?'↑':dv<0?'↓':'→';
      h += '<div class="ri">';
      h += '<span class="ri-l" title="'+r.label+'">'+r.label+'</span>';
      h += '<span class="ri-cur">'+(r.curVal!==null?'第'+r.curVal+'名':'—')+'</span>';
      h += '<span class="ri-prev">'+(r.prevVal!==null?'上周 '+r.prevVal:'—')+'</span>';
      if (dv!==null) h += '<span class="ri-d '+dc+'">'+arrow+' '+Math.abs(dv)+'</span>';
      h += '</div>';
    });
    h += '</div>';
  }

  // 关键发现
  if (ai.findings&&ai.findings.length) {
    h += '<div class="sh">关键发现</div><div class="fds">';
    ai.findings.forEach(function(f) {
      h += '<div class="fd '+(f.type||'action')+'"><span class="fd-txt">'+f.text+'</span></div>';
    });
    h += '</div>';
  }

  // 优化建议
  if (ai.suggestions&&ai.suggestions.length) {
    h += '<div class="sh">优化建议 / 行动清单</div><div class="sgs">';
    ai.suggestions.forEach(function(s,i) {
      var pcolor = s.priority==='高'?'var(--R)':s.priority==='中'?'var(--A)':'var(--G)';
      var parts = [];
      if (s.priority) parts.push('<span style="color:'+pcolor+';font-weight:600">'+s.priority+'优先</span>');
      if (s.owner)    parts.push('<span style="color:var(--ink3)">'+s.owner+'</span>');
      if (s.deadline) parts.push('<span style="color:var(--ink3)">'+s.deadline+'</span>');
      var meta = parts.join(' · ');
      h += '<div class="sg"><span class="sg-n">'+(i+1)+'</span><div style="flex:1">';
      if (meta) h += '<div style="font-size:11px;margin-bottom:3px">'+meta+'</div>';
      h += '<span>'+s.text+'</span></div></div>';
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function buildFallback(d) {
  d._rag = 'a';
  var h = '<div class="rcard">';
  h += '<div class="rcard-head">';
  h += '<div><div class="rcard-title">'+d.deptName+'</div>';
  h += '<div class="rcard-wk">'+(d.curWeek||'')+'</div></div>';
  h += '<span class="rpill rp-a">原始数据</span></div>';
  if (d.metrics.length) {
    var n = Math.min(d.metrics.length,4);
    h += '<div class="mgrid mg'+n+'">';
    d.metrics.slice(0,4).forEach(function(m) {
      var dc = m.trend==='up'?'up':m.trend==='down'?'dn':'fl2';
      h += '<div class="mc"><div class="mc-l">'+m.label+'</div>';
      h += '<div class="mc-v">'+(m.curVal||'—')+'</div>';
      if (m.deltaRate) h += '<div class="mc-d '+dc+'">'+m.deltaRate+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '<div class="fd warn"><span class="fd-txt">AI 分析失败：'+(d._err||'请检查接口配置')+'。以上为原始数据。</span></div>';
  h += '</div>';
  return h;
}

function buildOverview() {
  if (!parsedDepts.length) {
    document.getElementById('ov-top').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--ink3)">请先上传数据</div>';
    document.getElementById('dg').innerHTML=''; document.getElementById('decs').innerHTML=''; return;
  }
  const d=new Date(); document.getElementById('ov-sub').textContent=`${d.getFullYear()}年 · 第${wkNum()}周`;
  const findM=(dept,kws)=>{const dd=parsedDepts.find(x=>x.dept===dept);if(!dd)return null;for(const kw of kws){const m=dd.metrics.find(x=>x.label.includes(kw));if(m)return m;}return null;};
  const toN=m=>{if(!m)return 0;const v=parseFloat(m.rawCur||0);return isNaN(v)?0:v;};
  const tmM=findM('tmall',['销售净额','销售额']),jdM=findM('jd',['部门销售净额','销售净额']),pddM=findM('pdd',['部门销售净额']),liveM=findM('live',['销售净额']),dyM=findM('douyin',['店铺销售净额','销售净额']);
  const total=toN(tmM)+toN(jdM)+toN(pddM)+toN(liveM)+toN(dyM);
  const mkO=(label,m,sub)=>{const tc=m?.trend==='up'?'var(--G)':m?.trend==='down'?'var(--R)':'var(--ink3)';return `<div class="ovm"><div class="ovm-l">${label}</div><div class="ovm-v">${m?.curVal||'—'}</div><div class="ovm-s" style="color:${tc}">${sub||m?.deltaRate||'—'}</div></div>`;};
  document.getElementById('ov-top').innerHTML=`<div class="ovm"><div class="ovm-l">本周合计 GMV</div><div class="ovm-v">${fmtM(total)||'—'}</div><div class="ovm-s">货架 + 直播</div></div>`+mkO('天猫',tmM)+mkO('京东',jdM)+mkO('拼多多',pddM);
  document.getElementById('dg').innerHTML=parsedDepts.map(d=>{const rag=d._rag||'g',top3=d.metrics.slice(0,3),rows=top3.map(m=>`<div class="dc-row"><span class="dc-rl">${m.label}</span><span class="dc-rv">${m.curVal||'—'}</span></div>`).join(''),warn=d.metrics.find(m=>m.completion&&parseFloat(m.completion)<30);return `<div class="dc"><div class="dc-top"><span class="dc-name">${d.deptName}</span><span class="rpill ${RAG[rag].cls}">${{r:'红灯',a:'黄灯',g:'绿灯'}[rag]}</span></div><div class="dc-rows">${rows||'<span style="font-size:12px;color:var(--ink3)">暂无指标</span>'}</div>${warn?`<div class="dc-risk">⚠ ${warn.label}月完成率仅 ${warn.completion}</div>`:''}</div>`;}).join('');
  const mkD=(rag,d,color,tag)=>{const wM=d.metrics.find(m=>m.deltaRate&&m.deltaRate.startsWith('-')),lM=d.metrics.find(m=>m.completion&&parseFloat(m.completion)<25),txt=lM?`${lM.label}月完成率仅 ${lM.completion}，需立即关注`:wM?`${wM.label}环比 ${wM.deltaRate}，建议本周跟进`:'请查看详细报告';return `<div class="dei"><div class="dei-dot" style="background:${color}"></div><div style="flex:1"><div class="dei-tag" style="color:${color}">${tag} · ${d.deptName}</div><div class="dei-txt">${txt}</div><button class="dei-btn" onclick="getAdvice('${d.dept}')">获取决策建议 →</button></div></div>`;};
  let decHtml='';
  parsedDepts.filter(d=>d._rag==='r').forEach(d=>decHtml+=mkD('r',d,'var(--R)','紧急 · 需立即决策'));
  parsedDepts.filter(d=>d._rag==='a').forEach(d=>decHtml+=mkD('a',d,'var(--A)','关注 · 本周跟进'));
  if (!decHtml) decHtml='<div class="dei"><div class="dei-dot" style="background:var(--G)"></div><div><div class="dei-tag" style="color:var(--G)">本周无紧急决策事项</div><div class="dei-txt">各部门运行正常，按计划推进。</div></div></div>';
  document.getElementById('decs').innerHTML=decHtml;
  document.getElementById('opening-area').innerHTML='';
  renderOvAsk();
}

var askHistory = [];      // 报告页对话历史

function showRpt(dept) {
  document.querySelectorAll('.rt').forEach(function(b){b.classList.remove('on');});
  var btn = document.getElementById('rt-'+dept);
  if (btn) btn.classList.add('on');

function buildAskContext() {
  // 收集当前部门的完整数据作为上下文
  var dept = document.querySelector('.rt.on');
  var deptId = dept ? dept.id.replace('rt-','') : '';
  var deptData = parsedDepts.find(function(d){return d.dept===deptId;});
  if (!deptData) return '（无部门数据）';
  return buildSummary(deptData) + ' AI分析：' + (document.getElementById('rpt-body').innerText||'').slice(0,600);
}

function buildOvContext() {
  var parts = parsedDepts.slice(0,6).map(function(d){
    var m = d.metrics[0];
    return d.deptName + '（' + ({r:'红灯',a:'黄灯',g:'绿灯'}[d._rag||'g']) + '）：' + (m ? m.label+m.curVal : '无数据');
  });
  return '本周全公司经营数据：' + parts.join('；');
}

async function sendOvAsk() {

async function sendAsk() {
  var input = document.getElementById('ask-input');
  var q = input.value.trim();
  if (!q) return;
  var sendBtn = document.getElementById('ask-btn');
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  var history = document.getElementById('ask-history');
  // 显示用户问题
  history.innerHTML += '<div class="ask-bubble"><div class="ask-q"><span class="ask-q-label">你</span><span class="ask-q-text">'+q+'</span></div><div class="ask-a"><span class="ask-a-label">AI</span><span class="ask-a-text ask-a-loading" id="ask-loading">思考中...</span></div></div>';
  history.scrollTop = history.scrollHeight;

  // 构建消息历史
  askHistory.push({role:'user', content: q});
    var messages = [{role:'user', content: buildAskContext() + ' 用户问题：' + askHistory[0].content}];
  if (askHistory.length > 1) {
    for (var i = 1; i < askHistory.length; i++) {
      messages.push(askHistory[i]);
    }
  }

  try {
    var text = await callAI(
      '你是渔之源电商公司的AI助理，已经看过了本周的经营数据和分析报告。请根据数据内容回答用户的问题，回答要具体、有针对性，直接引用报告里的数据。如果要写邮件或文档，格式要专业实用。',
      messages[messages.length-1].content,
      600
    );
    askHistory.push({role:'assistant', content: text});
    var loadingEl = document.getElementById('ask-loading');
    if (loadingEl) {
      loadingEl.className = 'ask-a-text';
      loadingEl.textContent = text;
    }
  } catch(e) {
    var loadingEl = document.getElementById('ask-loading');
    if (loadingEl) {
      loadingEl.className = 'ask-a-text';
      loadingEl.style.color = 'var(--R)';
      loadingEl.textContent = '请求失败：' + e.message;
    }
  }
  history.scrollTop = history.scrollHeight;
  sendBtn.disabled = false;
  input.focus();
}

async function sendAskOv() {
  var input = document.getElementById('ask-input-ov');
  var q = input.value.trim();
  if (!q) return;
  input.value = '';
  input.style.height = 'auto';

  var history = document.getElementById('ask-history-ov');

  askHistoryOv.push({role:'user', content: q});

  try {
    var text = await callAI(
      '你是渔之源电商公司老板的AI助理，已掌握本周全公司经营数据。请简洁有力地回答问题，如需生成文档则格式专业。',

  }

}

function saveHist(data) { try{let h=JSON.parse(localStorage.getItem('yz_hist')||'[]');const idx=h.findIndex(x=>x.week===data.week&&x.year===data.year);if(idx>=0)h[idx]=data;else h.unshift(data);localStorage.setItem('yz_hist',JSON.stringify(h.slice(0,16)));}catch(e){} }
function loadHist() { try{return JSON.parse(localStorage.getItem('yz_hist')||'[]');}catch(e){return[];} }
function clearHist() { if(!confirm('确认清除全部历史记录？'))return;localStorage.removeItem('yz_hist');renderHist();toast('已清除'); }
function renderHist() {
  const hist=loadHist(),el=document.getElementById('hist-body');
  if (!hist.length) { el.innerHTML='<div style="text-align:center;padding:50px;font-size:13px;color:var(--ink3)">暂无历史数据<br><span style="font-size:12px;display:block;margin-top:6px">上传并分析后自动保存，最多 16 周</span></div>'; return; }
  const getV=(depts,dept,kws)=>{const d=depts?.find(x=>x.dept===dept);if(!d)return '—';for(const kw of kws){const m=d.metrics?.find(x=>x.label?.includes(kw));if(m)return m.curVal||'—';}return '—';};
  let h=`<div class="htscroll"><table class="htbl"><thead><tr><th>周次</th><th>天猫</th><th>京东</th><th>拼多多</th><th>直播/抖音</th><th>部门</th><th>状态</th></tr></thead><tbody>`;
  hist.forEach(w=>{
    const depts=w.depts||[],live=getV(depts,'live',['销售净额']),dy=getV(depts,'douyin',['店铺销售净额','销售净额']);
    const status=depts.map(d=>{const c={r:'var(--R)',a:'var(--A)',g:'var(--G)'}[d._rag||'g'];return `<span class="hdot" style="background:${c}"></span>${d.deptName}`;}).join(' ');
    h+=`<tr><td><span class="hw">${w.year}·W${w.week}</span></td><td>${getV(depts,'tmall',['销售净额'])}</td><td>${getV(depts,'jd',['部门销售净额','销售净额'])}</td><td>${getV(depts,'pdd',['部门销售净额'])}</td><td>${live!=='—'?live:dy}</td><td style="font-size:11px;color:var(--ink3)">${depts.map(d=>d.deptName).join('、')}</td><td style="white-space:nowrap;font-size:11px">${status}</td></tr>`;
  });
  h+='</tbody></table></div>';
  const weeks=hist.slice(0,8).reverse(),vals=weeks.map(w=>{const d=w.depts?.find(x=>x.dept==='tmall');return parseFloat(d?.metrics?.[0]?.rawCur||0)||0;}),mx=Math.max(...vals,1);
  if (vals.some(v=>v>0)) { h+=`<div class="spark"><div class="sp-l">天猫销售额趋势（近 ${weeks.length} 周）</div><div class="sp-bars">`; weeks.forEach((w,i)=>{const ht=Math.max(Math.round(vals[i]/mx*48),4);h+=`<div class="sp-col"><div class="sp-bar${i===weeks.length-1?' cur':''}" style="height:${ht}px"></div><div class="sp-wk">W${w.week}</div></div>`;});h+='</div></div>'; }
  el.innerHTML=h;
}
